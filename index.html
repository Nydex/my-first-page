<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter's Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --color-bg:       #f7f6f2;
      --color-surface:  #f9f8f5;
      --color-surface2: #ffffff;
      --color-text:     #28251d;
      --color-muted:    #7a7974;
      --color-faint:    #bab9b4;
      --color-primary:  #01696f;
      --color-primary-h:#0c4e54;
      --color-border:   rgba(40,37,29,0.10);
      --shadow:         0 2px 8px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --color-bg:       #131211;
      --color-surface:  #1c1b19;
      --color-surface2: #222120;
      --color-text:     #cdccca;
      --color-muted:    #797876;
      --color-faint:    #4a4947;
      --color-primary:  #4f98a3;
      --color-primary-h:#227f8b;
      --color-border:   rgba(255,255,255,0.07);
      --shadow:         0 2px 8px rgba(0,0,0,0.30), 0 8px 32px rgba(0,0,0,0.28);
    }

    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      transition: background 0.25s, color 0.25s;
      padding: 2rem 1rem;
    }

    /* Toggle */
    .toggle {
      position: fixed;
      top: 1rem; right: 1rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: var(--color-text);
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }
    .toggle:hover { background: var(--color-surface2); }

    /* Card */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 1.25rem;
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 6vw, 3.5rem);
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
    }

    /* Avatar */
    .avatar {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: var(--color-primary);
      margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      letter-spacing: -1px;
    }

    /* Name */
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
      line-height: 1.15;
    }

    /* Tagline */
    .tagline {
      color: var(--color-primary);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Bio */
    p.bio {
      color: var(--color-muted);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 36ch;
      margin-inline: auto;
    }

    /* Pills row */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .pill {
      background: var(--color-surface2);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      color: var(--color-muted);
      font-weight: 500;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, background 0.2s;
    }
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-primary-h); }
    .btn-ghost {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover { background: var(--color-surface2); }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 1.75rem 0;
    }

    .footer-text {
      font-size: 0.78rem;
      color: var(--color-faint);
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <button class="toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode" id="themeBtn">🌙</button>

  <div class="card">
    <div class="avatar">PP</div>
    <h1>Peter Poland</h1>
    <p class="tagline">Developer &amp; Modder</p>
    <p class="bio">Student developer from Banská Bystrica. I build web apps, Minecraft mods, and anything else that seems fun to create.</p>

    <div class="pills">
      <span class="pill">⚙️ Web Dev</span>
      <span class="pill">🧱 Minecraft Mods</span>
      <span class="pill">🎮 Games</span>
      <span class="pill">🖨️ 3D Modeling</span>
    </div>

    <div class="btn-row">
      <a class="btn btn-primary" href="https://github.com/Nydex" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.089-.744.084-.729.084-.729 1.205.084 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        GitHub
      </a>
      <a class="btn btn-ghost" href="mailto:peter@example.com">
        ✉️ Contact
      </a>
    </div>

    <hr class="divider">
    <p class="footer-text">Made with HTML · Hosted on GitHub Pages</p>
  </div>

  <script>
    const btn = document.getElementById('themeBtn');
    const html = document.documentElement;
    // Init icon based on current theme
    btn.textContent = html.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';

    function toggleTheme() {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      btn.textContent = isDark ? '🌙' : '☀️';
    }
  </script>
</body>
</html>
