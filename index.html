<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter's Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --color-bg:      #f7f6f2;
      --color-surface: #f9f8f5;
      --color-text:    #28251d;
      --color-muted:   #7a7974;
      --color-primary: #01696f;
      --color-border:  rgba(40,37,29,0.12);
    }
    [data-theme="dark"] {
      --color-bg:      #171614;
      --color-surface: #1c1b19;
      --color-text:    #cdccca;
      --color-muted:   #797876;
      --color-primary: #4f98a3;
      --color-border:  rgba(255,255,255,0.08);
    }

    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      background: var(--color-bg);
      color: var(--color-text);
      transition: background 0.3s, color 0.3s;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 1rem;
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--color-primary);
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
    }

    h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; margin-bottom: 0.5rem; }
    p  { color: var(--color-muted); font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }

    .btn {
      display: inline-block;
      background: var(--color-primary);
      color: #fff;
      padding: 0.6rem 1.5rem;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font-size: 1rem;
      color: var(--color-text);
      transition: background 0.2s;
    }
    .toggle:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <button class="toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode">☀️</button>

  <div class="card">
    <div class="avatar">P</div>
    <h1>Hey, I'm Peter 👋</h1>
    <p>Developer · Modder · Builder<br>Welcome to my simple HTML page, hosted on GitHub.</p>
    <a class="btn" href="https://github.com/Nydex" target="_blank" rel="noopener noreferrer">View GitHub</a>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
